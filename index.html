<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone, Paper, & Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="body">
    <!--Game Title-->
    <h1 id="heading">Stone✊ Paper🖐️ Scissors✌️</h1>

    <!--Light/Dark Mode Button-->
    <button id="mode">🌞</button>

    <!--Sub Title-->
    <h2 id="subHeading">Play and check out who wins!🔥</h2>

    <!--Tool buttons-->
    <div id="tools">
        <button id="Stone">✊</button>
        <button id="Paper">🖐️</button>
        <button id="Scissors">✌️</button>
    </div>

    <!--Score board-->
    <table>
        <tr id="columnName">
            <td id="you">You</td>
            <td id="system">System</td>
        </tr>

        <tr id="score">
            <td id="yourScore"></td>
            <td id="systemScore"></td>
        </tr>
    </table>

    <!--div to show round status-->
    <div id="move">Pick your move!</div>

    <script src="script.js"></script>
</body>
</html>
